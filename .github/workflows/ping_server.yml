name: Keep Render Awake

on:
  schedule:
    - cron: "*/14 * * * *"  # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Curl service
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" https://revanced-external-bundles.onrender.com
